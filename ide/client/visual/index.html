<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} data:; style-src {{cspSource}}; script-src {{cspSource}} 'nonce-{{nonce}}'; font-src {{cspSource}};"
    />
    <title>NiceGeo Visual Editor</title>
    <link rel="stylesheet" href="{{styleUri}}" />
    <script nonce="{{nonce}}" type="module" src="{{scriptUri}}"></script>
  </head>
  <body>
    <main class="app">
      <header>
        <div id="toolbar" role="toolbar" aria-label="Drawing tools"></div>
      </header>
      <section class="canvasShell" aria-label="Coordinate plane">
        <canvas id="planeCanvas"></canvas>
      </section>
    </main>
  </body>
</html>
