<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NiceGeo hover feature">
  <rect width="1280" height="720" fill="#1e1e1e"/>
  <rect x="70" y="70" width="1140" height="580" rx="16" fill="#252526" stroke="#3c3c3c"/>
  <text x="110" y="126" fill="#cccccc" font-size="32" font-family="Arial, sans-serif">Hover Information</text>
  <text x="110" y="162" fill="#bbbbbb" font-size="20" font-family="Arial, sans-serif">Place cursor on a symbol and pause.</text>

  <rect x="110" y="210" width="760" height="380" rx="12" fill="#1f1f1f" stroke="#3c3c3c"/>
